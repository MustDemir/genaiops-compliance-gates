      - name: "Gate G-OPS-05: Evidence Completeness (R005, Art.11)"
        id: g-ops-05
        run: |
          echo "::group::G-OPS-05 Evidence Completeness"
          echo "🗄️  Checking: Evidence store annotations present (Gatekeeper simulation)?"
          echo "   Policy: policies/operations/policy_evidence_completeness.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/admission_review_compliant.json"
          echo ""

          conftest test \
            "$SCENARIO_DIR/fixtures/admission_review_compliant.json" \
            --policy policies/operations/policy_evidence_completeness.rego \
            --namespace "genaiops.operations.evidence_completeness" \
            --no-color \
            --output json > /tmp/g-ops-05-result.json 2>/dev/null || true

          FAILURES=$(python3 -c "
          import json, sys
