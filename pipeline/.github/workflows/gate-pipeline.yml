            python3 -c "
          import json
          with open('/tmp/g-dep-01-result.json') as f:
            data = json.load(f)
          for r in data:
            for f in r.get('failures', []):
              print(f'  → {f[\"msg\"]}')
          " 2>/dev/null || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      # ── Step 3b: Additional Deployment Gate (new) ──
      - name: "Gate G-DEP-03: Transparency Documentation (R007, Art.13)"
        id: g-dep-03
        run: |
          echo "::group::G-DEP-03 Transparency Documentation"
          echo "📖 Checking: Transparency and user documentation present?"
          echo "   Policy: policies/deployment/policy_transparency_docs_present.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/app_documentation_transparency_pass.json"
          echo ""

          conftest test \
            "$SCENARIO_DIR/fixtures/app_documentation_transparency_pass.json" \
            --policy policies/deployment/policy_transparency_docs_present.rego \
            --namespace "genaiops.deployment.transparency_docs_present" \
            --no-color \
            --output json > /tmp/g-dep-03-result.json 2>/dev/null || true

          FAILURES=$(python3 -c "
          import json, sys
          try:
            with open('/tmp/g-dep-03-result.json') as f:
              data = json.load(f)
