          ")

          if [ "$FAILURES" = "0" ]; then
            echo "✅ G-DEP-02 PASS — Safety metrics within thresholds"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          elif [ "$FAILURES" = "-1" ]; then
            echo "⚠️  G-DEP-02 ERROR — Could not parse Conftest output"
            cat /tmp/g-dep-02-result.json || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          else
            echo "❌ G-DEP-02 FAIL — $FAILURES violations found"
            python3 -c "
          import json
          with open('/tmp/g-dep-02-result.json') as f:
            data = json.load(f)
          for r in data:
            for f in r.get('failures', []):
              print(f'  → {f[\"msg\"]}')
          " 2>/dev/null || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      # ── Step 2b: Additional Pre-Deployment Gates (new) ──
      - name: "Gate G-DEP-05: Bias Assessment (R013, Art.10(2)(f))"
        id: g-dep-05
        run: |
          echo "::group::G-DEP-05 Bias Assessment"
          echo "⚖️  Checking: Bias assessment complete with mitigation strategy?"
          echo "   Policy: policies/pre-deployment/policy_bias_assessment_complete.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/model_documentation_bias_pass.json"
          echo ""

          conftest test \
            "$SCENARIO_DIR/fixtures/model_documentation_bias_pass.json" \
            --policy policies/pre-deployment/policy_bias_assessment_complete.rego \
            --namespace "genaiops.pre_deployment.bias_assessment_complete" \
            --no-color \
            --output json > /tmp/g-dep-05-result.json 2>/dev/null || true

          FAILURES=$(python3 -c "
          import json, sys
          try:
            with open('/tmp/g-dep-05-result.json') as f:
              data = json.load(f)
            print(sum(len(r.get('failures', [])) for r in data))
          except Exception as e:
            print(f'::warning::G-DEP-05 JSON parse error: {e}', file=sys.stderr)
            print(-1)
          ")

          if [ "$FAILURES" = "0" ]; then
            echo "✅ G-DEP-05 PASS — Bias assessment verified"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          elif [ "$FAILURES" = "-1" ]; then
            echo "⚠️  G-DEP-05 ERROR — Could not parse Conftest output"
            cat /tmp/g-dep-05-result.json || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          else
            echo "❌ G-DEP-05 FAIL — $FAILURES violations found"
            python3 -c "
          import json
          with open('/tmp/g-dep-05-result.json') as f:
            data = json.load(f)
          for r in data:
            for f in r.get('failures', []):
              print(f'  → {f[\"msg\"]}')
          " 2>/dev/null || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      - name: "Gate G-DEP-01: Data Provenance (R002, Art.10)"
        id: g-dep-01
        run: |
          echo "::group::G-DEP-01 Data Provenance"
          echo "📂 Checking: Data provenance and governance documented?"
          echo "   Policy: policies/pre-deployment/policy_data_provenance_documented.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/data_documentation_provenance_pass.json"
          echo ""

          conftest test \
            "$SCENARIO_DIR/fixtures/data_documentation_provenance_pass.json" \
            --policy policies/pre-deployment/policy_data_provenance_documented.rego \
            --namespace "genaiops.pre_deployment.data_provenance_documented" \
            --no-color \
            --output json > /tmp/g-dep-01-result.json 2>/dev/null || true

          FAILURES=$(python3 -c "
          import json, sys
