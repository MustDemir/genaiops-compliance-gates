          else
            echo "❌ G-DEP-03 FAIL — $FAILURES violations found"
            python3 -c "
          import json
          with open('/tmp/g-dep-03-result.json') as f:
            data = json.load(f)
          for r in data:
            for f in r.get('failures', []):
              print(f'  → {f[\"msg\"]}')
          " 2>/dev/null || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      # ── Step 3c: Operations Gates (Gatekeeper — simulated via Conftest) ──
      - name: "Gate G-OPS-03: Monitoring Configuration (R010, Art.11)"
        id: g-ops-03
        run: |
          echo "::group::G-OPS-03 Monitoring Configuration"
          echo "📡 Checking: K8s monitoring annotations present (Gatekeeper simulation)?"
          echo "   Policy: policies/operations/policy_monitoring_configured.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/admission_review_compliant.json"
          echo ""

          conftest test \
            "$SCENARIO_DIR/fixtures/admission_review_compliant.json" \
            --policy policies/operations/policy_monitoring_configured.rego \
            --namespace "genaiops.operations.monitoring_configured" \
            --no-color \
            --output json > /tmp/g-ops-03-result.json 2>/dev/null || true

          FAILURES=$(python3 -c "
          import json, sys
          try:
            with open('/tmp/g-ops-03-result.json') as f:
              data = json.load(f)
            total = sum(len(r.get('failures', [])) + len(r.get('violations', [])) for r in data)
            print(total)
          except Exception as e:
            print(f'::warning::G-OPS-03 JSON parse error: {e}', file=sys.stderr)
            print(-1)
          ")

          if [ "$FAILURES" = "0" ]; then
            echo "✅ G-OPS-03 PASS — Monitoring configuration verified"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          elif [ "$FAILURES" = "-1" ]; then
