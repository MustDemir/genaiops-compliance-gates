      - name: "Gate G-OPS-02: Incident Process (R009, Art.26.5)"
        id: g-ops-02
        run: |
          echo "::group::G-OPS-02 Incident Process"
          echo "🚨 Checking: Incident response annotations present (Gatekeeper simulation)?"
          echo "   Policy: policies/operations/policy_incident_process_exists.rego"
          echo "   Input:  $SCENARIO_DIR/fixtures/deployment_incident_pass.json"
