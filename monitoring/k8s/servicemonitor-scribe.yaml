# ================================================================
# servicemonitor-scribe.yaml — Prometheus ServiceMonitor for AI Scribe
# ================================================================
# Phase 9.6: Tells Prometheus to scrape metrics from the AI Scribe app.
#
# What this does (Overview):
#   Without this file, Prometheus doesn't know our AI app exists.
#   The ServiceMonitor is like a "subscription" — it tells Prometheus:
#   "Hey, there's an app called 'ambient-ai-scribe' in the 'genaiops'
#   namespace. It exposes metrics on port 8080 at /metrics.
#   Please scrape it every 30 seconds."
#
#   Prometheus then collects:
#   - scribe_requests_total (how many transcriptions)
#   - scribe_latency_seconds (how fast)
#   - scribe_errors_total (how many failures)
#   These metrics feed into our drift detection (G-OPS-03).
#
# Architecture mapping:
#   Pillar S5 → G-OPS-03 → ServiceMonitor → Prometheus → drift_detector
# ================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ambient-ai-scribe
  namespace: genaiops
  labels:
    app.kubernetes.io/name: ambient-ai-scribe
    app.kubernetes.io/part-of: genaiops-compliance-gates
    # This label ensures kube-prometheus-stack picks it up
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ambient-ai-scribe
  namespaceSelector:
    matchNames:
      - genaiops
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
# ================================================================
# ServiceMonitor for Drift Detector (port 8081)
# ================================================================
# Scrapes PSI/JSD metrics exported by drift_detector.py
# so they appear in Prometheus and can trigger alerts.
# ================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drift-detector
  namespace: genaiops
  labels:
    app.kubernetes.io/name: drift-detector
    app.kubernetes.io/part-of: genaiops-compliance-gates
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: drift-detector
  namespaceSelector:
    matchNames:
      - genaiops
  endpoints:
    - port: metrics
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
