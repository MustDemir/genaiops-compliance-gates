id: R004
title: Human Oversight muss vor produktiver Nutzung organisatorisch verankert sein
kontrollmechanismus: Go/No-Go Gate mit dokumentierter Verantwortlichkeit und Eskalationsweg
lifecycle_phase: pre-deployment
governance_dimension: strategisch
eu_ai_act_refs:
- Art. 14
must_should: MUST
description: Vor Produktionsfreigabe muessen Rollen, Eingriffsrechte und Eskalationsregeln
  fuer menschliche Aufsicht dokumentiert sein.
evidence_expected:
- oversight_roles_matrix
- escalation_procedure
acceptance_criteria:
- Owner fuer Oversight ist benannt und freigegeben.
- Eskalationsprozess ist versioniert und fuer den Betriebsfall abrufbar.
linked_gates:
  - G-PRE-05
design_principles:
  - DP4
deployer_implication: "Oversight-Konzept mit dokumentierter strategischer Governance-Freigabe vor Deployment bereitstellen."
audit_trigger: "Pre-Deployment (Governance-Approval)"
sources:
- EU AI Act (VO 2024/1689) Art. 14
- Ho-Dac & Martinez (2024) [Zotero] — Art. 14 Human Oversight Standardisierung
notes: v0.4 - Operative
  Oversight-Wirksamkeit separat in R008. Ho-Dac analysiert Art. 14 Standardisierungsbedarfe.
