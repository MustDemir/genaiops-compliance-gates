id: R003
title: Robustheit, Genauigkeit und Sicherheitschecks muessen vor Promotion bestanden
  sein
kontrollmechanismus: Automatisierte Schwellenwertpruefung fuer Qualitaets- und Safety-Metriken
  in der Pipeline
lifecycle_phase: deployment
governance_dimension: technisch
eu_ai_act_refs:
- Art. 15
must_should: MUST
description: Ein Deployment darf nur erfolgen, wenn definierte technische Mindestkriterien
  nachweisbar erfuellt sind.
evidence_expected:
- eval_metrics_report
- safety_test_report
acceptance_criteria:
- Alle verpflichtenden Metriken liegen ueber den definierten Mindestwerten.
- Fehlgeschlagene Safety-Checks fuehren zu blockierendem Gate-Entscheid.
linked_gates:
  - G-PRE-04
  - G-DEP-02
  - G-OPS-04
design_principles:
  - DP1
deployer_implication: "Security-Baseline pre-deploy nachweisen, Safety-Metriken deploy-time validieren, Cybersecurity-Operations kontinuierlich überwachen."
audit_trigger: "Pre-Deployment + Deployment + Runtime (kontinuierlich)"
sources:
- EU AI Act (VO 2024/1689) Art. 15
- Elia (2025) MQG4AI [QRW95D4X] — Robustness-Gate-Konzept, technische Qualitaetssicherung
notes: v0.4 - Elia definiert
  Gate-basierte Robustheits-Pruefung.
