# ================================================================
# Test Fixture: Compliant Deployment (PASS case)
# ================================================================
# Shared PASS fixture for Conftest CI across multiple quality gates:
#   G-PRE-04 (security baseline), G-OPS-02 (incident process),
#   G-OPS-03 (monitoring), G-OPS-04 (cybersecurity operations),
#   G-OPS-05 (evidence completeness),
#   G-DEP-02 (safety metrics).
# All declared annotations are required for the Healthcare Ambient AI
# Scribe to be considered fully EU AI Act Art. 9–15, 26 compliant.
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-ai-scribe
  namespace: genaiops
  labels:
    app.kubernetes.io/name: ambient-ai-scribe
    app.kubernetes.io/version: "1.0.0"
    risk_class: "high"
  annotations:
    genaiops.io/governance-doc: "app_documentation.json"
    genaiops.io/annex-reference: "Annex III, Nr. 5 lit. a"
    genaiops.io/oversight-model: "human-in-the-loop"
    genaiops.io/fria-completed: "true"
    genaiops.io/drift-detection-enabled: "true"
    genaiops.io/service-monitor-configured: "true"
    genaiops.io/evidence-store-connected: "true"
    genaiops.io/hash-chain-enabled: "true"
    genaiops.io/evidence-store-type: "postgresql"
    genaiops.io/eval-passed: "true"
    genaiops.io/eval-run-id: "eval-20260325-001"
    genaiops.io/incident-response-configured: "true"
    genaiops.io/incident-contact: "ai-governance-team@hospital.example.com"
    genaiops.io/rollback-mechanism: "true"
    genaiops.io/image-scanning-enabled: "true"
    genaiops.io/network-policies-specified: "true"
    genaiops.io/encryption-at-rest: "true"
    genaiops.io/encryption-in-transit: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ambient-ai-scribe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ambient-ai-scribe
        risk_class: "high"
      annotations:
        genaiops.io/governance-doc: "app_documentation.json"
        genaiops.io/annex-reference: "Annex III, Nr. 5 lit. a"
        genaiops.io/oversight-model: "human-in-the-loop"
        genaiops.io/fria-completed: "true"
        genaiops.io/drift-detection-enabled: "true"
        genaiops.io/service-monitor-configured: "true"
        genaiops.io/evidence-store-connected: "true"
        genaiops.io/hash-chain-enabled: "true"
        genaiops.io/eval-passed: "true"
        genaiops.io/eval-run-id: "eval-20260325-001"
        genaiops.io/incident-response-configured: "true"
        genaiops.io/incident-contact: "ai-governance-team@hospital.example.com"
        genaiops.io/rollback-mechanism: "true"
        genaiops.io/image-scanning-enabled: "true"
        genaiops.io/network-policies-specified: "true"
        genaiops.io/encryption-at-rest: "true"
        genaiops.io/encryption-in-transit: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: scribe
          image: ambient-ai-scribe:1.0.0
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
