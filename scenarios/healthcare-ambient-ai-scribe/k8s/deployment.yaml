# ================================================================
# GenAIOps PoC — Ambient AI Scribe Deployment
# ================================================================
# G-PRE-04 Compliance (CDV-Contract, matches gate-definitions/G-PRE-04):
#   P1: runAsNonRoot + runAsUser 1000          (Non-Root)             [MUST]
#   P2: resources.limits (CPU + Memory)        (Resource Limits)      [MUST]
#   P3: readOnlyRootFilesystem: true           (Immutable Filesystem) [SHOULD]
#   P4: envFrom ConfigMap only, no secrets     (No Secrets in Manifest)[MUST]
#   P5: slim base image                        (via Dockerfile)       [SHOULD]
#   P6: allowPrivilegeEscalation: false        (No Privilege Escalation)[MUST]
#
# G-PRE-01: risk_class label for Conftest policy validation
# G-PRE-05: governance annotations for documentation reference
# G-DEP-02: eval-passed + eval-run-id for safety metrics gate
# G-OPS-03: monitoring annotations for ServiceMonitor discovery
# G-OPS-04: cybersecurity operations controls for runtime admission
# G-OPS-05: evidence-store annotations for audit trail
#
# Monitoring runtime is handled by a separate CronJob
# (see monitoring/k8s/cronjob-drift-detector.yaml for PSI + JSD checks)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-ai-scribe
  namespace: genaiops
  labels:
    app.kubernetes.io/name: ambient-ai-scribe
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: genaiops-compliance-gates
    # G-PRE-01: Risk classification for Conftest policy check
    risk_class: "high"
  annotations:
    # G-PRE-05: Governance documentation references
    genaiops.io/governance-doc: "app_documentation.json"
    genaiops.io/annex-reference: "Annex III, Nr. 5 lit. a"
    genaiops.io/oversight-model: "human-in-the-loop"
    genaiops.io/fria-completed: "true"
    # G-OPS-03: Monitoring & Drift Detection
    genaiops.io/drift-detection-enabled: "true"
    genaiops.io/service-monitor-configured: "true"
    genaiops.io/psi-critical-threshold: "0.2"
    # G-OPS-04: Cybersecurity Operations
    genaiops.io/image-scanning-enabled: "true"
    genaiops.io/network-policies-specified: "true"
    genaiops.io/encryption-at-rest: "true"
    genaiops.io/encryption-in-transit: "true"
    # G-DEP-02: Safety Metrics (CI eval gate passed)
    genaiops.io/eval-passed: "true"
    genaiops.io/eval-run-id: "eval-20260325-001"
    # G-OPS-05: Evidence Store
    genaiops.io/evidence-store-connected: "true"
    genaiops.io/hash-chain-enabled: "true"
    genaiops.io/evidence-store-type: "postgresql_with_blob"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ambient-ai-scribe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ambient-ai-scribe
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: genaiops-compliance-gates
        risk_class: "high"
      annotations:
        # G-PRE-05: Governance documentation (must match Deployment-level)
        genaiops.io/governance-doc: "app_documentation.json"
        genaiops.io/annex-reference: "Annex III, Nr. 5 lit. a"
        genaiops.io/oversight-model: "human-in-the-loop"
        genaiops.io/fria-completed: "true"
        # G-OPS-03: Monitoring & Drift Detection
        genaiops.io/drift-detection-enabled: "true"
        genaiops.io/service-monitor-configured: "true"
        # G-OPS-04: Cybersecurity Operations
        genaiops.io/image-scanning-enabled: "true"
        genaiops.io/network-policies-specified: "true"
        genaiops.io/encryption-at-rest: "true"
        genaiops.io/encryption-in-transit: "true"
        # G-DEP-02: Safety Metrics (CI eval gate passed)
        genaiops.io/eval-passed: "true"
        genaiops.io/eval-run-id: "eval-20260325-001"
        # G-OPS-05: Evidence Store
        genaiops.io/evidence-store-connected: "true"
        genaiops.io/hash-chain-enabled: "true"
        # Prometheus scrape config
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Pod-level security defaults
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        # --- Main Application Container ---
        - name: scribe
          image: ambient-ai-scribe:1.0.0
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: scribe-config
          # G-PRE-04 P1 + P6 + P3: Container-level security
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # G-PRE-04 P2: Resource limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Health probes for K8s lifecycle management
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Tmp volume for writable temp files (readOnlyRootFilesystem)
          volumeMounts:
            - name: tmp
              mountPath: /tmp

        # Monitoring: Drift detection runs as separate CronJob (cronjob-drift-detector.yaml)
        # See monitoring/k8s/ for PSI + Jensen-Shannon drift detector deployment

      volumes:
        - name: tmp
          emptyDir: {}
