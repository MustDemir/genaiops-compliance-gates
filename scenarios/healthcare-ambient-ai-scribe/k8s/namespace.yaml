# ================================================================
# GenAIOps PoC — Namespace
# ================================================================
# Isolates all PoC resources in a dedicated namespace.
# EU AI Act traceability: all resources carry consistent labels.
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: genaiops
  labels:
    app.kubernetes.io/part-of: genaiops-compliance-gates
    eu-ai-act/risk-class: "high"
    # Canonical label for Rego policy matching (policy_risk_classification_valid)
    risk_class: "high"
