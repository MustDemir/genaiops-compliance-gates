# ================================================================
# GenAIOps PoC — Gatekeeper Constraint: Monitoring Configured
# ================================================================
# G-OPS-03: Performance-Monitoring und Drift-Detection
#
# Ensures every Deployment in namespace "genaiops" has:
#   1. genaiops.io/drift-detection-enabled: "true"
#   2. genaiops.io/service-monitor-configured: "true"
#
# Trigger: kubectl apply → Gatekeeper Admission Controller
# Policy:  policy_monitoring_configured + policy_data_drift_monitoring
# ================================================================
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: genaiopsmonitoringconfigured
  labels:
    app.kubernetes.io/part-of: genaiops-compliance-gates
    app.kubernetes.io/component: gatekeeper
spec:
  crd:
    spec:
      names:
        kind: GenaiopsMonitoringConfigured
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requiredAnnotations:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package genaiopsmonitoringconfigured

        # Rule 1: Annotations block missing entirely
        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          not input.review.object.spec.template.metadata.annotations
          required := input.parameters.requiredAnnotations[_]
          msg := sprintf("G-OPS-03 FAIL: Pod template has no annotations. Required: '%v'='%v'", [required.key, required.value])
        }

        # Rule 2: Annotation present but wrong value
        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          annotations := input.review.object.spec.template.metadata.annotations
          required := input.parameters.requiredAnnotations[_]
          val := annotations[required.key]
          val != required.value
          msg := sprintf("G-OPS-03 FAIL: Pod annotation '%v' must be '%v', got '%v'", [required.key, required.value, val])
        }

        # Rule 3: Annotation key missing
        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          annotations := input.review.object.spec.template.metadata.annotations
          required := input.parameters.requiredAnnotations[_]
          not annotations[required.key]
          msg := sprintf("G-OPS-03 FAIL: Pod annotation '%v' is missing", [required.key])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: GenaiopsMonitoringConfigured
metadata:
  name: require-monitoring-annotations
  # NOTE: Constraints are cluster-scoped; namespace filtering via spec.match
  labels:
    app.kubernetes.io/part-of: genaiops-compliance-gates
    app.kubernetes.io/component: gatekeeper
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces: ["genaiops"]
  parameters:
    requiredAnnotations:
      - key: "genaiops.io/drift-detection-enabled"
        value: "true"
      - key: "genaiops.io/service-monitor-configured"
        value: "true"
