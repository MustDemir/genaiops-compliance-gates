# ================================================================
# GenAIOps PoC — Prometheus Configuration as ConfigMap
# ================================================================
# Source: monitoring/prometheus.yml
# Adapted for K8s: target uses K8s Service DNS name.
# Prometheus itself deployed via Helm in Phase 6.
# ================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: genaiops
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: genaiops-compliance-gates
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "ambient-ai-scribe"
        metrics_path: "/metrics"
        static_configs:
          - targets: ["ambient-ai-scribe.genaiops.svc.cluster.local:8080"]
            labels:
              app: "ambient-ai-scribe"
              environment: "minikube"
              risk_class: "high"
