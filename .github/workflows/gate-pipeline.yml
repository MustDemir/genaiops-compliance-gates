# ================================================================
# GenAIOps Compliance Gates — CI/CD Pipeline (10 Quality Gates)
# ================================================================
# Operationalizes Compliance-as-Code (D_CAC_AAC_DIFF):
#   EU AI Act Art. 9–15 → R001–R014 → Rego Policies → Pipeline Enforcement
#
# Triggered on: push to main, pull_request to main
#
# Test Layers (Shift-Left, fail-fast ordering):
#   Layer 1 — Rego Unit Tests (OPA): 103 tests across 10 policies.
#             Runs BEFORE any Gate-Conftest-Check. Any failure aborts the
#             pipeline immediately → prevents Conftest from evaluating
#             policies whose rule-semantics are broken.
#   Layer 2 — Gate Conftest Checks: 10 gates against scenario fixtures.
#   Layer 3 — Evidence + Hash-Chain: audit-trail integrity.
#
# Pre-Deployment Gates (5):
#   G-PRE-01: Risk Classification        (R001, Art.9)   — HYBRID
#   G-PRE-04: Security Baseline          (R003, Art.15)  — AUTO
#   G-PRE-05: Governance Approval        (R004, Art.14)  — HYBRID
#   G-DEP-05: Bias Assessment            (R013, Art.10)  — AUTO
#   G-DEP-01: Data Provenance            (R002, Art.11; R006, Art.10 — Co-Mapping) — AUTO
#
# Deployment Gates (2):
#   G-DEP-02: Safety Metrics             (R003, Art.15)  — AUTO
#   G-DEP-03: Transparency Docs          (R007, Art.13)  — HYBRID
#
# Operations Gates (3):
#   G-OPS-02: Incident Process           (R009, Art.26)  — AUTO
#   G-OPS-03: Monitoring Configuration   (R010, Art.72)  — AUTO
#   G-OPS-05: Evidence Completeness      (R005, Art.15)  — AUTO
#
# Evidence: Every gate result → Evidence Store (S4) with hash chain
# Traceability: Commit-SHA as image tag (DP2)
# ================================================================

name: GenAIOps Quality Gate Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'scenarios/healthcare-ambient-ai-scribe/**'
      - 'policies/**'
      - 'evidence-store/**'
      - 'pipeline/**'
      - 'monitoring/**'
  pull_request:
    branches: [main]
    paths:
      - 'scenarios/healthcare-ambient-ai-scribe/**'
      - 'policies/**'
      - 'evidence-store/**'
      - 'pipeline/**'
      - 'monitoring/**'
  workflow_dispatch:  # Manual trigger for demo/walkthrough

env:
  SCENARIO_DIR: scenarios/healthcare-ambient-ai-scribe
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ambient-ai-scribe
  # PoC: SQLite for Evidence Store (production → PostgreSQL)
  EVIDENCE_DB: /tmp/evidence_pipeline.db

jobs:
  # ────────────────────────────────────────────────────────
  # Job 1: Quality Gate Checks (S2 + S3) — All 10 Gates
  # ────────────────────────────────────────────────────────
  quality-gates:
    name: "Quality Gate Checks (10 Gates)"
    runs-on: ubuntu-latest
    outputs:
      gate_result: ${{ steps.gate-summary.outputs.result }}
      pipeline_run_id: ${{ steps.init.outputs.pipeline_run_id }}

    steps:
      # ── Setup ──
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize pipeline run
        id: init
        run: |
          PIPELINE_RUN_ID="pipeline-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}"
          echo "pipeline_run_id=$PIPELINE_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Pipeline Run ID: $PIPELINE_RUN_ID"
          echo "::notice::Commit SHA: $GITHUB_SHA"

      - name: Install OPA + Conftest
        run: |
          # ── Install OPA binary (for Rego unit tests, Layer 1) ──
          OPA_VERSION="1.15.2"
          wget -q "https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}/opa_linux_amd64_static" -O opa \
            || { echo "::error::Failed to download OPA v${OPA_VERSION}"; exit 1; }
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version
          echo "::notice::OPA v${OPA_VERSION} installed"

          # ── Install Conftest (Policy-as-Code tool for CI, Layer 2) ──
          CONFTEST_VERSION="0.56.0"
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            || { echo "::error::Failed to download Conftest v${CONFTEST_VERSION}"; exit 1; }
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
          conftest --version
          echo "::notice::Conftest v${CONFTEST_VERSION} installed"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install psycopg2-binary

      # ════════════════════════════════════════════════════════
      # Gate runner function (reusable across all 10 gates)
      # Separates stdout (JSON) from stderr (diagnostics).
      # Distinguishes Policy-FAIL (violations found) from
      # Tool-FAIL (Conftest crash, missing policy, syntax error).
      # ════════════════════════════════════════════════════════
      - name: "Define gate runner"
        run: |
          cat > /tmp/run_gate.sh << 'GATESCRIPT'
          #!/usr/bin/env bash
          GATE_ID="$1"; FIXTURE="$2"; POLICY="$3"; NAMESPACE="$4"
          RESULT_FILE="/tmp/${GATE_ID,,}-result.json"
          STDERR_FILE="/tmp/${GATE_ID,,}-result.stderr"

          conftest test "$FIXTURE" \
            --policy "$POLICY" \
            --namespace "$NAMESPACE" \
            --no-color --output json \
            > "$RESULT_FILE" 2> "$STDERR_FILE"
          CONFTEST_EXIT=$?

          # Check if output is valid JSON (Tool-FAIL vs Policy-FAIL)
          FAILURES=$(python3 -c "
          import json, sys
          try:
            with open('$RESULT_FILE') as f: data = json.load(f)
            print(sum(len(r.get('failures', [])) for r in data))
          except: print(-1)
          ")

          if [ "$FAILURES" = "-1" ]; then
            echo "::error::$GATE_ID — Conftest tool error (not a policy violation)"
            echo "--- stderr ---"
            cat "$STDERR_FILE"
            echo "--- stdout ---"
            cat "$RESULT_FILE"
            exit 1
          fi

          # Log stderr if non-empty (warnings, deprecations)
          if [ -s "$STDERR_FILE" ]; then
            echo "::warning::$GATE_ID stderr: $(cat "$STDERR_FILE" | head -3)"
          fi

          if [ "$FAILURES" = "0" ]; then
            echo "✅ $GATE_ID PASS"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "❌ $GATE_ID FAIL ($FAILURES violations)"
            python3 -c "
          import json
          with open('$RESULT_FILE') as f: data = json.load(f)
          for r in data:
            for f in r.get('failures', []):
              print(f'  → {f[\"msg\"]}')
          " 2>/dev/null || true
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          GATESCRIPT
          chmod +x /tmp/run_gate.sh

      # ════════════════════════════════════════════════════════
      # LAYER 1 — Rego Unit Tests (OPA, fail-fast)
      # Runs BEFORE any Conftest gate check. Any rule-semantic failure
      # aborts the pipeline before Gates evaluate → prevents silent
      # rule drift. Scope: 10 policies / 103 tests
      # (tests/run_all_rego_tests.sh).
      # ════════════════════════════════════════════════════════
      - name: "Rego Unit Tests (Layer 1 — 10 policies, 103 tests)"
        id: rego-unit-tests
        run: |
          echo "::group::Rego Unit Tests (OPA)"
          echo "🧪 Running OPA unit tests for all 10 Rego policies..."
          echo "   Runner: tests/run_all_rego_tests.sh"
          echo "   Expected: 103/103 PASS (ground-truth baseline 2026-04-17)"
          echo ""

          if ./tests/run_all_rego_tests.sh --quiet; then
            echo "✅ Rego Unit Tests PASS — 103/103 green"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
            echo "count=103" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Rego Unit Tests FAIL — pipeline aborted before Gate-Checks"
            echo "::error::Rego rule-semantics broken. Fix unit tests before re-running pipeline."
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "::endgroup::"

      # ════════════════════════════════════════════════════════
      # PRE-DEPLOYMENT GATES (5)
      # ════════════════════════════════════════════════════════

      - name: "Gate G-PRE-01: Risk Classification (R001, Art.9) [HYBRID]"
        id: g-pre-01
        run: |
          echo "::group::G-PRE-01 Risk Classification"
          bash /tmp/run_gate.sh G-PRE-01 \
            "$SCENARIO_DIR/fixtures/app_documentation.json" \
            "policies/pre-deployment/policy_risk_classification.rego" \
            "genaiops.pre_deployment.risk_classification"
          echo "::endgroup::"

      - name: "Gate G-PRE-04: Security Baseline (R003, Art.15) [AUTO]"
        id: g-pre-04
        run: |
          echo "::group::G-PRE-04 Security Baseline"
          bash /tmp/run_gate.sh G-PRE-04 \
            "$SCENARIO_DIR/fixtures/deployment_compliant.yaml" \
            "policies/pre-deployment/policy_security_baseline.rego" \
            "genaiops.pre_deployment.security_baseline"
          echo "::endgroup::"

      - name: "Gate G-PRE-05: Governance Approval (R004, Art.14) [HYBRID]"
        id: g-pre-05
        run: |
          echo "::group::G-PRE-05 Governance Approval"
          bash /tmp/run_gate.sh G-PRE-05 \
            "$SCENARIO_DIR/fixtures/app_documentation.json" \
            "policies/pre-deployment/policy_governance_approval.rego" \
            "genaiops.pre_deployment.governance_approval"
          echo "::endgroup::"

      - name: "Gate G-DEP-05: Bias Assessment (R013, Art.10) [AUTO]"
        id: g-dep-05
        run: |
          echo "::group::G-DEP-05 Bias Assessment"
          bash /tmp/run_gate.sh G-DEP-05 \
            "$SCENARIO_DIR/fixtures/model_documentation_bias_pass.json" \
            "policies/pre-deployment/policy_bias_assessment_complete.rego" \
            "genaiops.pre_deployment.bias_assessment_complete"
          echo "::endgroup::"

      - name: "Gate G-DEP-01: Data Provenance (R002, Art.11; R006, Art.10) [AUTO]"
        id: g-dep-01
        run: |
          echo "::group::G-DEP-01 Data Provenance"
          bash /tmp/run_gate.sh G-DEP-01 \
            "$SCENARIO_DIR/fixtures/data_documentation_provenance_pass.json" \
            "policies/pre-deployment/policy_data_provenance_documented.rego" \
            "genaiops.pre_deployment.data_provenance_documented"
          echo "::endgroup::"

      # ════════════════════════════════════════════════════════
      # DEPLOYMENT GATES (2)
      # ════════════════════════════════════════════════════════

      - name: "Gate G-DEP-02: Safety Metrics (R003, Art.15) [AUTO]"
        id: g-dep-02
        run: |
          echo "::group::G-DEP-02 Safety Metrics"
          bash /tmp/run_gate.sh G-DEP-02 \
            "$SCENARIO_DIR/fixtures/eval_results.json" \
            "policies/deployment/policy_safety_metrics.rego" \
            "genaiops.deployment.safety_metrics"
          echo "::endgroup::"

      - name: "Gate G-DEP-03: Transparency Docs (R007, Art.13) [HYBRID]"
        id: g-dep-03
        run: |
          echo "::group::G-DEP-03 Transparency Docs"
          bash /tmp/run_gate.sh G-DEP-03 \
            "$SCENARIO_DIR/fixtures/app_documentation_transparency_pass.json" \
            "policies/deployment/policy_transparency_docs_present.rego" \
            "genaiops.deployment.transparency_docs_present"
          echo "::endgroup::"

      # ════════════════════════════════════════════════════════
      # OPERATIONS GATES (3)
      # ════════════════════════════════════════════════════════

      - name: "Gate G-OPS-02: Incident Process (R009, Art.26) [AUTO]"
        id: g-ops-02
        run: |
          echo "::group::G-OPS-02 Incident Process"
          bash /tmp/run_gate.sh G-OPS-02 \
            "$SCENARIO_DIR/fixtures/deployment_incident_pass.json" \
            "policies/operations/policy_incident_process_exists.rego" \
            "genaiops.operations.incident_process_exists"
          echo "::endgroup::"

      - name: "Gate G-OPS-03: Monitoring Config (R010, Art.72) [AUTO]"
        id: g-ops-03
        run: |
          echo "::group::G-OPS-03 Monitoring Configuration"
          bash /tmp/run_gate.sh G-OPS-03 \
            "$SCENARIO_DIR/fixtures/deployment_compliant.yaml" \
            "policies/operations/policy_monitoring_configured.rego" \
            "genaiops.operations.monitoring_configured"
          echo "::endgroup::"

      - name: "Gate G-OPS-05: Evidence Completeness (R005, Art.15) [AUTO]"
        id: g-ops-05
        run: |
          echo "::group::G-OPS-05 Evidence Completeness"
          bash /tmp/run_gate.sh G-OPS-05 \
            "$SCENARIO_DIR/fixtures/deployment_compliant.yaml" \
            "policies/operations/policy_evidence_completeness.rego" \
            "genaiops.operations.evidence_completeness"
          echo "::endgroup::"

      # ════════════════════════════════════════════════════════
      # EVIDENCE RECORDING (S4)
      # ════════════════════════════════════════════════════════

      - name: "Record Evidence — All 10 Gate Results"
        id: evidence
        run: |
          echo "::group::Evidence Store Recording"
          echo "📦 Recording all 10 gate results to Evidence Store..."
          echo "   Database: $EVIDENCE_DB (SQLite for PoC)"
          echo ""

          for gate_info in \
            "G-PRE-01:R001:${{ steps.g-pre-01.outputs.result }}:HYBRID:decision_log_gpre01_manual.json" \
            "G-PRE-04:R003:${{ steps.g-pre-04.outputs.result }}:AUTO:" \
            "G-PRE-05:R004:${{ steps.g-pre-05.outputs.result }}:HYBRID:decision_log_gpre05_manual.json" \
            "G-DEP-05:R013:${{ steps.g-dep-05.outputs.result }}:AUTO:" \
            "G-DEP-01:R002:${{ steps.g-dep-01.outputs.result }}:AUTO:" \
            "G-DEP-02:R003:${{ steps.g-dep-02.outputs.result }}:AUTO:" \
            "G-DEP-03:R007:${{ steps.g-dep-03.outputs.result }}:HYBRID:decision_log_gdep03_manual.json" \
            "G-OPS-02:R009:${{ steps.g-ops-02.outputs.result }}:AUTO:" \
            "G-OPS-03:R010:${{ steps.g-ops-03.outputs.result }}:AUTO:" \
            "G-OPS-05:R005:${{ steps.g-ops-05.outputs.result }}:AUTO:"
          do
            IFS=':' read -r GATE_ID REQ_ID DECISION METHOD DECISION_LOG <<< "$gate_info"
            RESULT_FILE="/tmp/${GATE_ID,,}-result.json"
            EVIDENCE_SOURCE="/tmp/evidence_${GATE_ID,,}.json"
            DECISION_LOG_PATH=""
            if [ -n "$DECISION_LOG" ]; then
              DECISION_LOG_PATH="$SCENARIO_DIR/fixtures/$DECISION_LOG"
            fi

            python3 -c "
          import json
          conftest = {}
          try:
            with open('$RESULT_FILE') as f: conftest = json.load(f)
          except: pass
          decision_log = None
          if '$DECISION_LOG_PATH':
            try:
              with open('$DECISION_LOG_PATH') as f: decision_log = json.load(f)
            except: pass
          evidence = {
            'pipeline_run_id': '${{ steps.init.outputs.pipeline_run_id }}',
            'commit_sha': '$GITHUB_SHA',
            'trigger': '${{ github.event_name }}',
            'actor': '${{ github.actor }}',
            'gate_id': '$GATE_ID',
            'requirement_id': '$REQ_ID',
            'decision': '$DECISION',
            'method': '$METHOD',
            'conftest_output': conftest
          }
          if decision_log:
            evidence['decision_log'] = decision_log
            evidence['manual_reviewer'] = decision_log.get('reviewed_by', 'unknown')
          with open('$EVIDENCE_SOURCE', 'w') as f:
            json.dump(evidence, f)
          "

            python3 evidence-store/scripts/record_evidence.py \
              --sqlite "$EVIDENCE_DB" \
              --gate "$GATE_ID" \
              --method "$METHOD" \
              --source "$EVIDENCE_SOURCE" \
              && echo "  ✅ $GATE_ID ($DECISION) [$METHOD] → Evidence recorded" \
              || { echo "::error::$GATE_ID — Evidence recording FAILED"; exit 1; }
          done
          echo "::endgroup::"

      # ── Hash Chain Verification (S4 + DP5) ──
      - name: "Verify Hash Chain Integrity"
        id: hash-chain
        run: |
          echo "::group::Hash Chain Verification"
          echo "🔗 Verifying tamper-proof audit trail (10 records)..."
          python3 evidence-store/scripts/verify_hash_chain.py \
            --sqlite "$EVIDENCE_DB" \
            && echo "✅ Hash chain VALID — Evidence Store integrity confirmed" \
            || { echo "::error::Hash chain verification FAILED — Evidence Store may be corrupted"; exit 1; }
          echo "::endgroup::"

      # ── Gate Summary + Decision ──
      - name: "Pipeline Decision"
        id: gate-summary
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  GenAIOps Quality Gate Pipeline — 10 Gate Summary       ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Pipeline: ${{ steps.init.outputs.pipeline_run_id }}"
          echo "║  Commit:   ${GITHUB_SHA::8}"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  PRE-DEPLOYMENT:"
          echo "║    G-PRE-01 Risk Classification:  ${{ steps.g-pre-01.outputs.result }}  [HYBRID]"
          echo "║    G-PRE-04 Security Baseline:    ${{ steps.g-pre-04.outputs.result }}  [AUTO]"
          echo "║    G-PRE-05 Governance Approval:  ${{ steps.g-pre-05.outputs.result }}  [HYBRID]"
          echo "║    G-DEP-05 Bias Assessment:      ${{ steps.g-dep-05.outputs.result }}  [AUTO]"
          echo "║    G-DEP-01 Data Provenance:      ${{ steps.g-dep-01.outputs.result }}  [AUTO]"
          echo "║  DEPLOYMENT:"
          echo "║    G-DEP-02 Safety Metrics:       ${{ steps.g-dep-02.outputs.result }}  [AUTO]"
          echo "║    G-DEP-03 Transparency Docs:    ${{ steps.g-dep-03.outputs.result }}  [HYBRID]"
          echo "║  OPERATIONS:"
          echo "║    G-OPS-02 Incident Process:     ${{ steps.g-ops-02.outputs.result }}  [AUTO]"
          echo "║    G-OPS-03 Monitoring Config:    ${{ steps.g-ops-03.outputs.result }}  [AUTO]"
          echo "║    G-OPS-05 Evidence Complete:    ${{ steps.g-ops-05.outputs.result }}  [AUTO]"
          echo "╠══════════════════════════════════════════════════════════╣"

          GATES=(
            "${{ steps.g-pre-01.outputs.result }}"
            "${{ steps.g-pre-04.outputs.result }}"
            "${{ steps.g-pre-05.outputs.result }}"
            "${{ steps.g-dep-05.outputs.result }}"
            "${{ steps.g-dep-01.outputs.result }}"
            "${{ steps.g-dep-02.outputs.result }}"
            "${{ steps.g-dep-03.outputs.result }}"
            "${{ steps.g-ops-02.outputs.result }}"
            "${{ steps.g-ops-03.outputs.result }}"
            "${{ steps.g-ops-05.outputs.result }}"
          )
          ALL_PASS=true
          for g in "${GATES[@]}"; do
            if [ "$g" = "FAIL" ]; then ALL_PASS=false; break; fi
          done

          if [ "$ALL_PASS" = true ]; then
            echo "║  DECISION: ✅ ALL 10 GATES PASSED — Deploy authorized  ║"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "║  DECISION: ❌ GATE FAILURE — Deploy BLOCKED            ║"
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
          echo "╚══════════════════════════════════════════════════════════╝"

          if [ "$ALL_PASS" = false ]; then
            echo "::error::Quality Gate failure — deployment blocked. Fix violations and re-push."
            exit 1
          fi

  # ────────────────────────────────────────────────────────
  # Job 2: Build + Push Docker Image (only if all 10 gates pass)
  # ────────────────────────────────────────────────────────
  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: quality-gates
    if: needs.quality-gates.outputs.gate_result == 'PASS'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile-check
        run: |
          if [ -f "$SCENARIO_DIR/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No Dockerfile — skipping Docker build (gates passed)"
          fi

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: steps.dockerfile-check.outputs.exists == 'true'
        run: |
          IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${IMAGE_OWNER}/ambient-ai-scribe"
          docker build \
            -t "${IMAGE_TAG}:${{ github.sha }}" \
            -t "${IMAGE_TAG}:latest" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "genaiops.pipeline.run-id=${{ needs.quality-gates.outputs.pipeline_run_id }}" \
            --label "genaiops.gates.result=PASS" \
            --label "genaiops.gates.count=10" \
            "$SCENARIO_DIR"

      - name: Push Docker image
        if: steps.dockerfile-check.outputs.exists == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${IMAGE_OWNER}/ambient-ai-scribe"
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"
          echo "::notice::Image pushed: ${IMAGE_TAG}:${{ github.sha }}"

      - name: "Pipeline Complete"
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  ✅ GenAIOps Pipeline COMPLETE                          ║"
          echo "║                                                          ║"
          echo "║  Gates:  10/10 PASS (5 PRE + 2 DEP + 3 OPS)            ║"
          echo "║  Evidence: 10 records + Hash Chain Verified              ║"
          echo "║  HYBRID: G-PRE-01, G-PRE-05, G-DEP-03 (AUTO + Manual)  ║"
          echo "║                                                          ║"
          echo "║  CDV-Pattern: Contract → Validation → PASS → Deploy     ║"
          echo "╚══════════════════════════════════════════════════════════╝"
