# Copilot Coding Agent – Setup Steps
# Installs the tools needed by Copilot to work on this repository.

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install OPA / Conftest CLI
    run: |
      # OPA
      curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
      chmod +x /usr/local/bin/opa

      # Conftest
      CONFTEST_VERSION="0.56.0"
      curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
        | tar xz -C /usr/local/bin conftest
      chmod +x /usr/local/bin/conftest
